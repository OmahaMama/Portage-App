<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Portage"/>
<title>Portage</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --cream: #faf7f2;
    --dark: #2a1f14;
    --gold: #c8a96e;
    --muted: #7a6a57;
    --border: #ddd3c4;
    --white: #ffffff;
    --shadow: 0 2px 12px rgba(0,0,0,.07);
    --shadow-lg: 0 8px 40px rgba(0,0,0,.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--cream); font-family: 'Lora', Georgia, serif; color: var(--dark); overscroll-behavior: none; }
  body { overflow-x: hidden; }

  /* ── Header ── */
  #app-header {
    background: var(--dark);
    padding: 16px 20px 14px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 200;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); letter-spacing: 3px; cursor: pointer; border: none; background: none; }
  .header-actions { display: flex; gap: 8px; }
  .header-btn {
    background: transparent; border: 1px solid var(--gold); color: var(--gold);
    border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 12px;
    font-family: 'Lora', serif; white-space: nowrap;
  }

  /* ── Pages ── */
  .page { max-width: 680px; margin: 0 auto; padding: 28px 18px 100px; }

  /* ── Trip cards ── */
  .trip-card {
    background: var(--white); border-radius: 16px; padding: 20px;
    margin-bottom: 14px; cursor: pointer; box-shadow: var(--shadow);
    border: 1.5px solid transparent; transition: border .2s, box-shadow .2s;
    display: flex; align-items: center; gap: 16px;
  }
  .trip-card:active { border-color: var(--gold); box-shadow: 0 4px 20px rgba(200,169,110,.18); }
  .trip-emoji { font-size: 38px; min-width: 48px; text-align: center; }
  .trip-info { flex: 1; min-width: 0; }
  .trip-name { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .trip-dest { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .trip-dates { color: #aaa; font-size: 12px; margin-top: 3px; }
  .trip-actions { display: flex; flex-direction: column; gap: 4px; }
  .icon-btn { background: none; border: none; cursor: pointer; font-size: 17px; padding: 4px; }

  /* ── Status pill ── */
  .pill {
    display: inline-block; font-size: 10px; border-radius: 20px;
    padding: 2px 9px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
  }
  .pill-upcoming { background: rgba(200,169,110,.15); color: var(--gold); }
  .pill-ongoing  { background: rgba(76,175,125,.15); color: #4caf7d; }
  .pill-past     { background: rgba(0,0,0,.07); color: #999; }

  /* ── Buttons ── */
  .btn-primary {
    background: var(--gold); border: none; color: #fff;
    border-radius: 10px; padding: 11px 20px; cursor: pointer;
    font-family: 'Playfair Display', serif; font-size: 15px;
  }
  .btn-secondary {
    background: var(--white); border: 1.5px solid var(--border); color: var(--dark);
    border-radius: 10px; padding: 11px 20px; cursor: pointer;
    font-family: 'Playfair Display', serif; font-size: 15px;
  }
  .btn-dark {
    background: var(--dark); border: none; color: var(--gold);
    border-radius: 10px; padding: 11px 20px; cursor: pointer;
    font-family: 'Playfair Display', serif; font-size: 15px;
  }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }

  /* ── Back link ── */
  .back-btn { background: none; border: none; color: var(--gold); cursor: pointer; font-size: 14px; font-family: 'Lora', serif; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; padding: 0; }

  /* ── Day cards ── */
  .day-card { background: var(--white); border-radius: 14px; margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow); }
  .day-header { padding: 15px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .day-num { background: var(--dark); color: var(--gold); border-radius: 10px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; flex-shrink: 0; }
  .day-label { margin-left: 14px; flex: 1; }
  .day-title { font-family: 'Playfair Display', serif; font-size: 16px; }
  .day-count { color: #aaa; font-size: 12px; margin-top: 2px; }
  .day-chevron { color: var(--gold); font-size: 16px; transition: transform .2s; }
  .day-chevron.open { transform: rotate(180deg); }

  /* ── Activity rows ── */
  .act-row { padding: 12px 18px; border-top: 1px solid #f0ebe3; display: flex; align-items: flex-start; gap: 12px; }
  .act-icon { font-size: 20px; min-width: 26px; }
  .act-body { flex: 1; min-width: 0; }
  .act-title { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 600; }
  .act-time { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .act-notes { color: var(--muted); font-size: 12px; margin-top: 3px; }
  .act-conf { display: inline-block; font-size: 10px; background: #fff; border: 1px solid var(--border); border-radius: 20px; padding: 1px 8px; color: var(--muted); margin-top: 3px; }
  .act-btns { display: flex; gap: 2px; }
  .act-address { color: var(--gold); font-size: 12px; margin-top: 3px; text-decoration: none; display: block; }
  .act-qr { margin-top: 10px; text-align: center; }
  .act-qr img { max-width: 180px; width: 100%; border-radius: 8px; border: 1.5px solid var(--border); cursor: pointer; }
  .act-qr-label { font-size: 11px; color: #aaa; margin-top: 4px; }
  .qr-fullscreen { position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .qr-fullscreen img { max-width: min(90vw, 400px); border-radius: 12px; }
  .qr-fullscreen p { color: #fff; font-family: 'Playfair Display', serif; font-size: 18px; }
  .qr-fullscreen button { background: none; border: 1px solid #fff; color: #fff; border-radius: 8px; padding: 8px 20px; cursor: pointer; font-family: 'Lora', serif; }

  .add-day-btn { margin: 10px 18px 14px; background: none; border: 1.5px dashed var(--border); border-radius: 8px; padding: 8px 14px; color: var(--muted); cursor: pointer; font-size: 13px; font-family: 'Lora', serif; }

  /* ── Map ── */
  .day-map { height: 220px; margin: 0 18px 14px; border-radius: 10px; z-index: 0; position: relative; }

  /* ── Modals ── */
  .modal-bg { position: fixed; inset: 0; background: rgba(20,16,10,.72); z-index: 500; display: flex; align-items: flex-end; justify-content: center; }
  @media(min-width:500px) { .modal-bg { align-items: center; } }
  .modal {
    background: var(--cream); border-radius: 20px 20px 0 0; padding: 28px 24px 40px;
    width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(0,0,0,.2);
  }
  @media(min-width:500px) { .modal { border-radius: 20px; padding-bottom: 28px; } }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 18px; }
  .modal-desc { color: var(--muted); font-size: 14px; margin-bottom: 18px; margin-top: -10px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1.5px solid var(--border);
    background: var(--white); font-family: 'Lora', serif; font-size: 14px; color: var(--dark);
  }
  .field textarea { resize: vertical; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel { background: none; border: 1.5px solid var(--border); color: var(--muted); border-radius: 8px; padding: 10px 18px; cursor: pointer; font-family: 'Lora', serif; font-size: 14px; }

  /* ── Import result preview ── */
  .import-preview { background: var(--white); border: 1.5px solid var(--gold); border-radius: 12px; padding: 14px; margin-top: 14px; }
  .import-preview-title { font-family: 'Playfair Display', serif; font-size: 16px; margin-bottom: 6px; }
  .import-preview-meta { color: var(--muted); font-size: 13px; line-height: 1.7; }
  .import-new-trip { color: var(--gold); font-size: 13px; font-weight: 600; margin-top: 6px; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 70px 20px; color: #b0a090; }
  .empty-icon { font-size: 60px; margin-bottom: 14px; }
  .empty-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--dark); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; }

  /* ── Page title ── */
  .page-heading { margin-bottom: 26px; }
  .page-heading h1 { font-family: 'Playfair Display', serif; font-size: 30px; margin-bottom: 4px; }
  .page-heading p { color: var(--muted); font-size: 14px; }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }

  /* ── Fade-in ── */
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .fade-up { animation: fadeUp .3s ease both; }

  /* ── Type colors ── */
  .type-flight     { background: #e8f4fd; }
  .type-hotel      { background: #fdf0e8; }
  .type-restaurant { background: #fdf8e8; }
  .type-activity   { background: #edf8f0; }
  .type-transport  { background: #f0edf8; }
  .type-other      { background: #f5f5f5; }

  /* ── PWA safe area ── */
  @supports(padding: max(0px)) {
    #app-header { padding-top: max(16px, env(safe-area-inset-top)); }
    .page { padding-bottom: max(100px, calc(env(safe-area-inset-bottom) + 80px)); }
  }
</style>
</head>
<body>

<header id="app-header">
  <button class="logo" onclick="goHome()">PORTAGE</button>
  <div class="header-actions">
    <button class="header-btn" id="import-conf-btn" style="display:none" onclick="openImportModal()">✨ Import</button>
    <button class="header-btn" onclick="showApiKeyModal()" title="Set API Key">🔑</button>
    <button class="header-btn" onclick="exportData()">↓ Export</button>
    <label class="header-btn" style="cursor:pointer">↑ Restore <input type="file" accept=".json" onchange="importData(event)" style="display:none"/></label>
  </div>
</header>

<div id="root"></div>

<!-- ══════════════════════════════════════════════════════════════════════ -->
<script>
// ── Storage ──────────────────────────────────────────────────────────────
const STORAGE_KEY = "portage_v2";
let state = { trips: [], view: "home", activeTripId: null, expandedDay: null };

function load() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) state.trips = JSON.parse(s); } catch {}
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.trips)); } catch {}
}
load();

// ── Helpers ───────────────────────────────────────────────────────────────
function uid() { return Math.random().toString(16).slice(2, 10); }
function getDays(start, end) {
  const days = []; let cur = new Date(start + "T00:00:00"), e = new Date(end + "T00:00:00");
  while (cur <= e) { days.push(cur.toISOString().slice(0, 10)); cur.setDate(cur.getDate() + 1); }
  return days;
}
function fmtDate(d) {
  return new Date(d + "T00:00:00").toLocaleDateString("en-US", { weekday: "short", month: "long", day: "numeric" });
}
const TYPE_ICON = { flight:"✈️", hotel:"🏨", restaurant:"🍽️", activity:"🎯", transport:"🚗", other:"📌" };
const DEST_EMOJIS = ["🌍","🗺️","🧳","🌏","🏝️","🗼","🏔️","🌆"];
function destEmoji(name) { let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))&0xffffffff; return DEST_EMOJIS[Math.abs(h)%DEST_EMOJIS.length]; }
function tripStatus(t) {
  const now=new Date(), s=new Date(t.startDate+"T00:00:00"), e=new Date(t.endDate+"T00:00:00");
  return now<s?"upcoming":now>e?"past":"ongoing";
}
function activeTrip() { return state.trips.find(t=>t.id===state.activeTripId); }

// ── API Key management ────────────────────────────────────────────────────
const API_KEY_STORAGE = "portage_gemini_key_v1";
function getApiKey() { return localStorage.getItem(API_KEY_STORAGE)||""; }
function saveApiKey(k) { localStorage.setItem(API_KEY_STORAGE, k.trim()); }
function clearApiKey() { localStorage.removeItem(API_KEY_STORAGE); }

function showApiKeyModal() {
  const existing = getApiKey();
  const html=`<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
    <div class="modal">
      <h2 class="modal-title">🔑 Google Gemini API Key</h2>
      <p class="modal-desc">Portage uses Google Gemini (free) to parse your confirmation emails. Your key stays only on this device and is never shared.</p>
      <p class="modal-desc" style="margin-top:-10px">
        Get a free key at <a href="https://aistudio.google.com" target="_blank" style="color:var(--gold)">aistudio.google.com</a> → Get API Key → Create API key
      </p>
      <div class="field">
        <label>Your Gemini API Key</label>
        <input id="f-apikey" type="password" value="${esc(existing)}" placeholder="Paste your key here…" style="font-family:monospace;font-size:13px"/>
      </div>
      <p style="font-size:11px;color:#aaa;margin-top:-8px">Stored locally on your device only. Only sent to Google's servers when parsing an email.</p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="document.getElementById('modal-bg').remove()">Cancel</button>
        ${existing?`<button class="btn-cancel" onclick="clearApiKey();document.getElementById('modal-bg').remove()">Clear Key</button>`:""}
        <button class="btn-dark" onclick="
          const k=document.getElementById('f-apikey').value.trim();
          if(k.length<10){document.getElementById('apikey-err').style.display='block';return;}
          saveApiKey(k);document.getElementById('modal-bg').remove();
        ">Save & Continue</button>
      </div>
      <p id="apikey-err" style="color:#c0392b;font-size:12px;margin-top:8px;display:none">Please paste a valid API key.</p>
    </div>
  </div>`;
  document.body.insertAdjacentHTML("beforeend", html);
}

// ── Map management ────────────────────────────────────────────────────────
const mapInstances = {};
function destroyMaps() { Object.keys(mapInstances).forEach(k=>{ try{mapInstances[k].remove();}catch{} delete mapInstances[k]; }); }
function renderMap(date, acts) {
  const locs = acts.filter(a=>a.lat&&a.lng);
  if (!locs.length) return;
  const id = "map-" + date;
  const el = document.getElementById(id);
  if (!el) return;
  if (mapInstances[id]) { try{mapInstances[id].remove();}catch{} delete mapInstances[id]; }
  const map = L.map(el, { zoomControl:true, scrollWheelZoom:false });
  mapInstances[id] = map;
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap"}).addTo(map);
  const bounds = [];
  locs.forEach((loc,i)=>{
    const icon = L.divIcon({ className:"", html:`<div style="background:#c8a96e;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-family:serif;font-weight:700;font-size:13px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)">${i+1}</div>`, iconSize:[28,28], iconAnchor:[14,14] });
    L.marker([loc.lat,loc.lng],{icon}).addTo(map).bindPopup(`<b>${loc.title}</b>${loc.time?`<br/>${loc.time}`:""}`);
    bounds.push([loc.lat,loc.lng]);
  });
  if (bounds.length===1) map.setView(bounds[0],14); else map.fitBounds(bounds,{padding:[28,28]});
}

// ── Render engine ─────────────────────────────────────────────────────────
function render() {
  destroyMaps();
  document.getElementById("root").innerHTML = state.view==="home" ? renderHome() : renderTrip();
  document.getElementById("import-conf-btn").style.display = state.view==="trip" ? "block" : "none";
  // render maps after DOM update
  if (state.view==="trip") {
    const trip = activeTrip(); if (!trip) return;
    getDays(trip.startDate, trip.endDate).forEach(date=>{
      if (state.expandedDay===date) {
        const acts = (trip.days[date]||[]).slice().sort((a,b)=>(a.time||"").localeCompare(b.time||""));
        requestAnimationFrame(()=>renderMap(date, acts));
      }
    });
  }
}

// ── Home view ──────────────────────────────────────────────────────────────
function renderHome() {
  const trips = state.trips;
  let cards = trips.length === 0
    ? `<div class="empty"><div class="empty-icon">🧳</div><p class="empty-title">No trips yet</p><p class="empty-sub">Tap "New Trip" to get started</p></div>`
    : trips.map(trip=>{
        const status=tripStatus(trip);
        const days=getDays(trip.startDate,trip.endDate).length;
        return `<div class="trip-card fade-up" onclick="openTrip('${trip.id}')">
          <div class="trip-emoji">${destEmoji(trip.destination||trip.name)}</div>
          <div class="trip-info">
            <div class="trip-name">${esc(trip.name)}</div>
            <div class="trip-dest">${esc(trip.destination||"")} <span class="pill pill-${status}">${status}</span></div>
            <div class="trip-dates">${fmtDate(trip.startDate)} — ${fmtDate(trip.endDate)} · ${days} days</div>
          </div>
          <div class="trip-actions">
            <button class="icon-btn" onclick="event.stopPropagation();editTrip('${trip.id}')">✏️</button>
            <button class="icon-btn" onclick="event.stopPropagation();deleteTrip('${trip.id}')">🗑️</button>
          </div>
        </div>`;
      }).join("");

  return `<div class="page">
    <div class="page-heading" style="display:flex;align-items:center;justify-content:space-between">
      <div><h1>My Trips</h1><p>${trips.length} ${trips.length===1?"adventure":"adventures"} planned</p></div>
      <button class="btn-primary" onclick="openNewTripModal()">+ New Trip</button>
    </div>
    ${cards}
  </div>`;
}

// ── Trip view ──────────────────────────────────────────────────────────────
function renderTrip() {
  const trip = activeTrip(); if (!trip) return renderHome();
  const days = getDays(trip.startDate, trip.endDate);

  const daycards = days.map((date, di) => {
    const acts = (trip.days[date]||[]).slice().sort((a,b)=>(a.time||"").localeCompare(b.time||""));
    const open = state.expandedDay===date;
    let inner = "";
    if (open) {
      const rows = acts.length===0
        ? `<p style="padding:12px 18px;color:#bbb;font-size:13px;font-style:italic">No activities yet — add one or import a confirmation.</p>`
        : acts.map(act=>`
          <div class="act-row type-${act.type}">
            <div class="act-icon">${TYPE_ICON[act.type]||"📌"}</div>
            <div class="act-body">
              <div class="act-title">${esc(act.title)}</div>
              ${act.time?`<div class="act-time">${act.time}${act.endTime?` – ${act.endTime}`:""}</div>`:""}
              ${act.notes?`<div class="act-notes">${esc(act.notes)}</div>`:""}
              ${act.confirmation?`<span class="act-conf">#${esc(act.confirmation)}</span>`:""}
              ${act.address?`<a class="act-address" href="https://maps.apple.com/?q=${encodeURIComponent(act.address)}" target="_blank">📍 ${esc(act.address)}</a>`:""}
              ${act.qr?`<div class="act-qr"><img src="${act.qr}" alt="QR Code" onclick="showQR('${act.id}','${esc(act.title)}')"/><div class="act-qr-label">Tap to enlarge</div></div>`:""}
            </div>
            <div class="act-btns">
              <button class="icon-btn" onclick="editActivity('${date}','${act.id}')">✏️</button>
              <button class="icon-btn" onclick="deleteActivity('${date}','${act.id}')">🗑️</button>
            </div>
          </div>`).join("");
      const mapHTML = acts.some(a=>a.lat&&a.lng) ? `<div class="day-map" id="map-${date}"></div>` : "";
      inner = rows + mapHTML + `<button class="add-day-btn" onclick="openActivityModal('${date}')">+ Add activity to this day</button>`;
    }
    return `<div class="day-card">
      <div class="day-header" onclick="toggleDay('${date}')">
        <div class="day-num">${di+1}</div>
        <div class="day-label">
          <div class="day-title">${fmtDate(date)}</div>
          <div class="day-count">${acts.length} ${acts.length===1?"activity":"activities"}</div>
        </div>
        <div class="day-chevron${open?" open":""}">▼</div>
      </div>
      ${inner}
    </div>`;
  }).join("");

  return `<div class="page">
    <button class="back-btn" onclick="goHome()">← All Trips</button>
    <div class="page-heading">
      <h1>${esc(trip.name)}</h1>
      <p>${esc(trip.destination||"")} · ${fmtDate(trip.startDate)} — ${fmtDate(trip.endDate)}</p>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="openImportModal()">✨ Import Confirmation</button>
      <button class="btn-secondary" onclick="openActivityModal('${getDays(trip.startDate,trip.endDate)[0]}')">+ Add Activity</button>
    </div>
    ${daycards}
  </div>`;
}

function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ── Navigation ─────────────────────────────────────────────────────────────
function goHome() { state.view="home"; state.activeTripId=null; state.expandedDay=null; render(); }
function openTrip(id) { state.activeTripId=id; state.view="trip"; state.expandedDay=null; render(); }
function toggleDay(date) { state.expandedDay = state.expandedDay===date?null:date; render(); }

// ── Trip CRUD ──────────────────────────────────────────────────────────────
let _editingTripId = null;
function openNewTripModal() { _editingTripId=null; showTripModal(null); }
function editTrip(id) { _editingTripId=id; showTripModal(state.trips.find(t=>t.id===id)); }
function showTripModal(trip) {
  const html = `<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
    <div class="modal">
      <h2 class="modal-title">${trip?"Edit Trip":"New Trip"}</h2>
      <div class="field"><label>Trip Name</label><input id="f-name" value="${esc(trip?.name||"")}" placeholder="e.g. Summer in Italy"/></div>
      <div class="field"><label>Destination</label><input id="f-dest" value="${esc(trip?.destination||"")}" placeholder="e.g. Rome, Italy"/></div>
      <div class="field-row">
        <div class="field"><label>Start Date</label><input type="date" id="f-start" value="${trip?.startDate||""}"/></div>
        <div class="field"><label>End Date</label><input type="date" id="f-end" value="${trip?.endDate||""}"/></div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="document.getElementById('modal-bg').remove()">Cancel</button>
        <button class="btn-dark" onclick="saveTrip()">Save</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML("beforeend", html);
}
function saveTrip() {
  const name=document.getElementById("f-name").value.trim();
  const dest=document.getElementById("f-dest").value.trim();
  const start=document.getElementById("f-start").value;
  const end=document.getElementById("f-end").value;
  if (!name||!start||!end) return alert("Please fill in all fields.");
  if (_editingTripId) {
    state.trips = state.trips.map(t=>t.id===_editingTripId?{...t,name,destination:dest,startDate:start,endDate:end}:t);
  } else {
    state.trips.push({id:uid(),name,destination:dest,startDate:start,endDate:end,days:{}});
  }
  save(); document.getElementById("modal-bg").remove(); render();
}
function deleteTrip(id) {
  if (!confirm("Delete this trip and all its data?")) return;
  state.trips = state.trips.filter(t=>t.id!==id);
  if (state.activeTripId===id) { state.view="home"; state.activeTripId=null; }
  save(); render();
}

// ── Activity CRUD ──────────────────────────────────────────────────────────
let _activityDay=null, _editingActId=null;
function openActivityModal(date, actId=null) {
  _activityDay=date; _editingActId=actId;
  const trip=activeTrip();
  const act = actId ? (trip.days[date]||[]).find(a=>a.id===actId) : null;
  const types=["flight","hotel","restaurant","activity","transport","other"];
  const opts=types.map(t=>`<option value="${t}"${act?.type===t?" selected":""}>${t}</option>`).join("");
  const html=`<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
    <div class="modal">
      <h2 class="modal-title">${act?"Edit Activity":"Add Activity"}</h2>
      <p class="modal-desc">${fmtDate(date)}</p>
      <div class="field"><label>Title</label><input id="f-title" value="${esc(act?.title||"")}" placeholder="e.g. Check in at Hotel Hassler"/></div>
      <div class="field"><label>Type</label><select id="f-type">${opts}</select></div>
      <div class="field-row">
        <div class="field"><label>Start Time</label><input type="time" id="f-time" value="${act?.time||""}"/></div>
        <div class="field"><label>End Time</label><input type="time" id="f-etime" value="${act?.endTime||""}"/></div>
      </div>
      <div class="field"><label>Confirmation #</label><input id="f-conf" value="${esc(act?.confirmation||"")}" placeholder="optional"/></div>
      <div class="field"><label>Notes</label><textarea id="f-notes" rows="3" placeholder="optional">${esc(act?.notes||"")}</textarea></div>
      <div class="field"><label>Address</label><input id="f-address" value="${esc(act?.address||"")}" placeholder="e.g. 2025 Benjamin Franklin Pkwy, Philadelphia"/></div>
      <div class="field-row">
        <div class="field"><label>Latitude</label><input type="number" id="f-lat" value="${act?.lat||""}" placeholder="optional" step="any"/></div>
        <div class="field"><label>Longitude</label><input type="number" id="f-lng" value="${act?.lng||""}" placeholder="optional" step="any"/></div>
      </div>
      <div class="field">
        <label>QR Code / Ticket Image</label>
        ${act?.qr?`<div style="margin-bottom:8px;text-align:center"><img src="${act.qr}" style="max-width:140px;border-radius:8px;border:1.5px solid var(--border)"/></div>`:""}
        <input type="file" id="f-qr" accept="image/*" style="font-size:13px;padding:8px"/>
        ${act?.qr?`<button type="button" onclick="document.getElementById('f-qr-clear').value='1';document.querySelector('.qr-preview-wrap').style.display='none'" style="font-size:12px;color:#c0392b;background:none;border:none;cursor:pointer;margin-top:4px">Remove QR code</button><input type="hidden" id="f-qr-clear" value="0"/>`:`<input type="hidden" id="f-qr-clear" value="0"/>`}
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="document.getElementById('modal-bg').remove()">Cancel</button>
        <button class="btn-dark" onclick="saveActivity()">Save</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML("beforeend", html);
}
function editActivity(date, actId) { openActivityModal(date, actId); }
function saveActivity() {
  const title=document.getElementById("f-title").value.trim();
  if (!title) return alert("Please enter a title.");
  const qrFile=document.getElementById("f-qr")?.files?.[0];
  const qrClear=document.getElementById("f-qr-clear")?.value==="1";
  const existingAct=_editingActId?(activeTrip()?.days[_activityDay]||[]).find(a=>a.id===_editingActId):null;
  function doSave(qrData) {
    const act={
      id: _editingActId||uid(), type:document.getElementById("f-type").value,
      title, time:document.getElementById("f-time").value,
      endTime:document.getElementById("f-etime").value,
      confirmation:document.getElementById("f-conf").value.trim(),
      notes:document.getElementById("f-notes").value.trim(),
      address:document.getElementById("f-address").value.trim(),
      lat:parseFloat(document.getElementById("f-lat").value)||null,
      lng:parseFloat(document.getElementById("f-lng").value)||null,
      qr: qrClear ? null : (qrData || existingAct?.qr || null)
    };
    state.trips=state.trips.map(t=>{
      if(t.id!==state.activeTripId) return t;
      const days={...t.days};
      const existing=days[_activityDay]||[];
      days[_activityDay]=_editingActId ? existing.map(a=>a.id===_editingActId?act:a) : [...existing,act];
      return {...t,days};
    });
    save(); document.getElementById("modal-bg").remove(); render();
  }
  if (qrFile) {
    const reader=new FileReader();
    reader.onload=e=>doSave(e.target.result);
    reader.readAsDataURL(qrFile);
  } else { doSave(null); }
  return;

}
function deleteActivity(date, actId) {
  if (!confirm("Remove this activity?")) return;
  state.trips=state.trips.map(t=>{
    if(t.id!==state.activeTripId) return t;
    const days={...t.days};
    days[date]=(days[date]||[]).filter(a=>a.id!==actId);
    return {...t,days};
  });
  save(); render();
}

// ── Import modal ───────────────────────────────────────────────────────────
let _importResult = null;
function openImportModal() {
  _importResult=null;
  const html=`<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
    <div class="modal">
      <h2 class="modal-title">Import Confirmation</h2>
      <p class="modal-desc">Paste your booking confirmation email text below. Claude will automatically extract the details.</p>
      <div class="field"><label>Email Text</label><textarea id="f-email" rows="8" placeholder="Paste confirmation email here…" style="font-family:monospace;font-size:12px"></textarea></div>
      <div id="import-error" style="color:#c0392b;font-size:13px;margin-top:6px;display:none"></div>
      <div id="import-preview"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="document.getElementById('modal-bg').remove()">Cancel</button>
        <button class="btn-primary" id="parse-btn" onclick="parseConfirmation()">Parse with AI ✨</button>
        <button class="btn-dark" id="add-btn" style="display:none" onclick="addImport()">Add to Itinerary →</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML("beforeend", html);
}

async function parseConfirmation() {
  const text=document.getElementById("f-email").value.trim();
  if (!text) return;
  const btn=document.getElementById("parse-btn");
  btn.innerHTML='<span class="spinner"></span>Parsing…'; btn.disabled=true;
  document.getElementById("import-error").style.display="none";

  const tripList=state.trips.map((t,i)=>`${i}: ${t.name} (${t.startDate} to ${t.endDate})`).join("\n")||"none";
  try {
    const apiKey = getApiKey();
    if (!apiKey) { showApiKeyModal(); btn.innerHTML="Parse with AI ✨"; btn.disabled=false; return; }
    const prompt = `You are a travel itinerary parser. Extract booking/confirmation details from email text and return ONLY valid JSON (no markdown, no preamble).

Return exactly this structure:
{
  "tripIndex": <index of best matching trip, or -1 if no match>,
  "newTrip": { "name": "...", "startDate": "YYYY-MM-DD", "endDate": "YYYY-MM-DD", "destination": "..." } or null,
  "dayDate": "YYYY-MM-DD",
  "activity": {
    "id": "<random 8 char hex>",
    "type": "flight|hotel|restaurant|activity|transport|other",
    "title": "...",
    "time": "HH:MM or empty string",
    "endTime": "HH:MM or empty string",
    "notes": "...",
    "confirmation": "...",
    "address": "full street address or empty string",
    "lat": <number or null>,
    "lng": <number or null>
  }
}

Existing trips:\n${tripList}\n\nEmail to parse:\n${text}`;
    const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key="+apiKey,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ contents:[{ parts:[{ text: prompt }] }] })
    });
    const data=await res.json();
    if (data.error) {
      const msg = data.error.code===401||data.error.code===403
        ? "Invalid API key — tap 🔑 in the header to update it."
        : "API error: " + (data.error.message||"unknown error");
      document.getElementById("import-error").textContent=msg;
      document.getElementById("import-error").style.display="block";
      btn.innerHTML="Parse with AI ✨"; btn.disabled=false; return;
    }
    const raw=data.candidates?.[0]?.content?.parts?.[0]?.text||"";
    _importResult=JSON.parse(raw.replace(/```json|```/g,"").trim());

    const a=_importResult.activity;
    const TYPE_LABELS={flight:"✈️ Flight",hotel:"🏨 Hotel",restaurant:"🍽️ Restaurant",activity:"🎯 Activity",transport:"🚗 Transport",other:"📌 Other"};
    let preview=`<div class="import-preview">
      <div class="import-preview-title">${TYPE_LABELS[a.type]||"📌"}: ${esc(a.title)}</div>
      <div class="import-preview-meta">
        📅 ${_importResult.dayDate}${a.time?` at ${a.time}`:""}
        ${a.confirmation?`<br/>🔖 Confirmation: ${esc(a.confirmation)}`:""}
        ${a.notes?`<br/>📝 ${esc(a.notes)}`:""}
      </div>
      ${_importResult.tripIndex===-1&&_importResult.newTrip?`<div class="import-new-trip">⚡ Will create new trip: ${esc(_importResult.newTrip.name)}</div>`:""}
    </div>`;
    document.getElementById("import-preview").innerHTML=preview;
    document.getElementById("parse-btn").style.display="none";
    document.getElementById("add-btn").style.display="block";
  } catch(e) {
    document.getElementById("import-error").textContent="Could not parse — try pasting more of the email text.";
    document.getElementById("import-error").style.display="block";
    btn.innerHTML="Parse with AI ✨"; btn.disabled=false;
  }
}

function addImport() {
  if (!_importResult) return;
  let trips=[...state.trips];
  let idx=_importResult.tripIndex;
  if (idx===-1&&_importResult.newTrip) {
    trips.push({..._importResult.newTrip, id:uid(), days:{}});
    idx=trips.length-1;
  }
  if (idx<0||idx>=trips.length) return;
  const trip={...trips[idx]};
  const days={...trip.days};
  const date=_importResult.dayDate;
  const act={..._importResult.activity, lat:_importResult.activity.lat?parseFloat(_importResult.activity.lat):null, lng:_importResult.activity.lng?parseFloat(_importResult.activity.lng):null};
  days[date]=[...(days[date]||[]),act];
  trip.days=days; trips[idx]=trip;
  state.trips=trips; save();
  document.getElementById("modal-bg").remove();
  if (idx>=0) { state.activeTripId=trips[idx].id; state.view="trip"; }
  render();
}

// ── Export / Restore ──────────────────────────────────────────────────────
function exportData() {
  const blob=new Blob([JSON.stringify(state.trips,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="portage-backup.json"; a.click();
  URL.revokeObjectURL(url);
}
function importData(e) {
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); if(Array.isArray(d)){state.trips=d;save();render();alert("Trips restored!");} else alert("Invalid file."); }catch{alert("Could not read file.");} };
  r.readAsText(file); e.target.value="";
}

// ── QR fullscreen viewer ─────────────────────────────────────────────────
function showQR(actId, title) {
  const trip=activeTrip(); if(!trip) return;
  let qr=null;
  for (const date of Object.keys(trip.days)) {
    const act=(trip.days[date]||[]).find(a=>a.id===actId);
    if(act?.qr){qr=act.qr;break;}
  }
  if(!qr) return;
  const html=`<div class="qr-fullscreen" id="qr-fs" onclick="document.getElementById('qr-fs').remove()">
    <p>${esc(title)}</p>
    <img src="${qr}" alt="QR Code"/>
    <button onclick="document.getElementById('qr-fs').remove()">Close</button>
  </div>`;
  document.body.insertAdjacentHTML("beforeend", html);
}

// ── Close modal on bg click ───────────────────────────────────────────────
function closeModal(e) { if(e.target.id==="modal-bg") e.target.remove(); }

// ── Init ──────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
